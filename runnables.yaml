name: TensorSwitch
description: High-performance microscopy data conversion tool. Converts 200+ formats (TIFF, ND2, CZI, IMS, HDF5, N5, Zarr, etc.) to Zarr3/Zarr2/N5 with automatic multi-scale pyramid generation.
version: "2.0.3"

requirements:
  - "pixi>=0.40"

runnables:
  - id: convert
    type: job
    name: TensorSwitch
    description: >
      Convert a microscopy file (TIFF, ND2, CZI, IMS, HDF5, Zarr, N5, and 200+ formats)
      to Zarr3, Zarr2, or N5. Optionally generates a multi-scale pyramid and/or upsamples
      to isotropic resolution.

      Fields marked * are required. All other fields are optional — leave blank for
      auto-calculated defaults.
    command: pixi run tensorswitch-v2 --submit
    parameters:
      - flag: -i
        name: "Input Path *"
        type: file
        description: "Required. Path to input file (TIFF, ND2, CZI, IMS, HDF5, N5, Zarr, and 200+ formats). Format is auto-detected from extension."
        required: true

      - flag: -o
        name: "Output Path *"
        type: directory
        description: "Required. Output path for the converted dataset (e.g., /path/to/output.zarr). You can type a new path — TensorSwitch creates the directory automatically."
        required: true

      - flag: --project
        name: "LSF Billing Project *"
        type: string
        description: "Required. LSF project name for cluster job billing (e.g. scicompsoft)."
        required: true

      - flag: --output_format
        name: Output Format
        type: enum
        description: "Output format. Zarr3 (recommended) supports sharding for large datasets."
        default: zarr3
        options:
          - zarr3
          - zarr2
          - n5

      - flag: --auto_multiscale
        name: Generate Multi-Scale Pyramid
        type: boolean
        description: "Automatically generate a full multi-scale pyramid after converting s0. Recommended for visualization in Neuroglancer or WebKnossos."
        default: false

      - flag: --is-label
        name: Label / Segmentation Data
        type: boolean
        description: "Input is a segmentation or label volume. Uses mode downsampling for the pyramid (preserves label IDs)."
        default: false

      - section: Cluster Resources
        description: >
          Resources for the conversion worker job. Enable auto-calculate (default) to let
          TensorSwitch determine the values from your dataset. Disable it to specify values
          manually. (Once conditional field support is available, the fields below will be
          automatically disabled when auto-calculate is on.)
        collapsed: false
        parameters:
          - flag: --auto_resources
            name: Auto-calculate Resources
            type: boolean
            description: "Let TensorSwitch automatically determine CPU cores, memory, and wall time from your dataset. When enabled, leave the fields below blank. Disable to specify values manually."
            default: true

          - flag: --cores
            name: CPU Cores
            type: integer
            description: "Number of CPU cores for the conversion worker. Leave blank when auto-calculate is enabled."
            min: 1
            max: 256

          - flag: --memory
            name: Memory (GB)
            type: integer
            description: "Memory in GB for the conversion worker. Leave blank when auto-calculate is enabled."
            min: 1
            max: 2048

          - flag: --wall_time
            name: Wall Time
            type: string
            description: "Maximum wall time for the conversion worker in H:MM format (e.g. 4:00). Leave blank when auto-calculate is enabled."

      - section: Chunk & Shard
        description: "Control how data is chunked and sharded. Leave blank for auto-calculated values. Shard Shape and Disable Sharding only apply to Zarr3."
        collapsed: true
        parameters:
          - flag: --chunk_shape
            name: Chunk Shape
            type: string
            description: "Inner chunk shape, comma-separated (e.g. 128,128,128 or 1,128,128,128 for 4D). Leave blank to auto-calculate."

          - flag: --shard_shape
            name: Shard Shape
            type: string
            description: "Shard shape for Zarr3, comma-separated (e.g. 1024,1024,1024). Leave blank to auto-calculate."

          - flag: --no_sharding
            name: Disable Sharding
            type: boolean
            description: "Disable sharding for Zarr3. Produces one file per chunk (like Zarr2)."
            default: false

          - flag: --preset
            name: Preset
            type: enum
            description: "Use a preset configuration. 'webknossos': 32³ chunks, 1024³ shards. 'paintera': N5 with 64³ chunks."
            default: ""
            options:
              - ""
              - webknossos
              - paintera

      - section: Voxel & Data Type
        description: "Override voxel sizes or output data type."
        collapsed: true
        parameters:
          - flag: --voxel_size
            name: Voxel Size
            type: string
            description: "Physical voxel size as comma-separated X,Y,Z (e.g. 108,108,268). Required if source file has no embedded voxel metadata."

          - flag: --voxel_unit
            name: Voxel Unit
            type: enum
            description: "Unit for voxel size values in OME metadata."
            default: nanometer
            options:
              - nanometer
              - micrometer
              - millimeter

          - flag: --dtype
            name: Output Data Type
            type: string
            description: "Override output data type (e.g. uint8, uint16, int16, float32). Leave blank to preserve source dtype."

          - flag: --compression
            name: Compression Codec
            type: string
            description: "Compression codec. Options: zstd (default), gzip, blosc, none."
            default: zstd

          - flag: --compression_level
            name: Compression Level
            type: integer
            description: "Compression level. For zstd: 1–22 (default 5). For gzip: 1–9."
            default: 5

      - section: Pyramid Options
        description: "Fine-tune multi-scale pyramid generation. Only applies when Generate Multi-Scale Pyramid is enabled."
        collapsed: true
        parameters:
          - flag: --downsample_method
            name: Downsample Method
            type: enum
            description: "Downsampling method. 'auto' detects from data type (mean for images, mode for labels)."
            default: auto
            options:
              - auto
              - mean
              - mode
              - median
              - stride
              - min
              - max

          - flag: --per_level_factors
            name: Per-Level Factors
            type: string
            description: "Custom per-level downsampling factors, semicolon-separated (e.g. 1,2,2;1,2,2;2,2,2). Leave blank to auto-calculate from voxel sizes."

      - section: Upsample to Isotropic
        description: "Resample anisotropic data to isotropic resolution before or instead of pyramid generation."
        collapsed: true
        parameters:
          - flag: --upsample
            name: Upsample to Isotropic
            type: boolean
            description: "Resample anisotropic data to isotropic resolution using interpolation (trilinear for images, nearest for labels). Useful for data with coarse Z (e.g. ssTEM)."
            default: false

          - flag: --target_voxel_size
            name: Target Voxel Size (nm)
            type: number
            description: "Target isotropic voxel size in nanometers. Leave blank to auto-detect from smallest source voxel size."

          - flag: --upsample_method
            name: Upsample Method
            type: enum
            description: "Interpolation method for upsampling."
            default: auto
            options:
              - auto
              - trilinear
              - nearest
              - cubic

      - section: Output Structure
        description: "Control output directory layout and metadata."
        collapsed: true
        parameters:
          - flag: --no-nested-structure
            name: Disable Nested Structure
            type: boolean
            description: "Write directly to the output path instead of the default OME-NGFF nested structure (raw/ subdirectory)."
            default: false

          - flag: --no_ome_xml_attr
            name: No OME-XML in zarr.json
            type: boolean
            description: "Do not embed OME/CZI XML in zarr.json. XML is still saved as a standalone METADATA.ome.xml file."
            default: false

          - flag: --axes_order
            name: Axes Order
            type: string
            description: "Override output spatial axis order (e.g. xyz, zyx). Default: preserve source order."

          - flag: --data-type
            name: Data Structure Type
            type: enum
            description: "'auto' detects from dtype. 'image' writes to raw/. 'labels' writes to labels/segmentation/."
            default: auto
            options:
              - auto
              - image
              - labels

          - flag: --bbox
            name: Bounding Box
            type: string
            description: "Extract a subvolume: origin_z,origin_y,origin_x,size_z,size_y,size_x. Example: 0,0,0,512,512,512."

      - section: Format-Specific
        description: "Options for specific input formats."
        collapsed: true
        parameters:
          - flag: --dataset_path
            name: Dataset Path (within container)
            type: string
            description: "Path within the input container (e.g. 's0' for N5, 'DataSet' for HDF5)."

          - flag: --view_index
            name: CZI View Index
            type: integer
            description: "For multi-view CZI files: index of the view to extract (-1 = all views as 5D VCZYX)."
            default: -1

          - flag: --use_bioformats
            name: Force Bio-Formats Reader
            type: boolean
            description: "Force the Bio-Formats Java-backed reader for exotic formats not handled by native readers."
            default: false

    resources:
      cpus: 2
      memory: "8 GB"
      walltime: "1:00"
