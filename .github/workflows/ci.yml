name: CI

on:
  push:
    branches: [unified, main]
  pull_request:
    branches: [unified, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Run tests
        run: |
          pixi run python -m pytest \
            tests/tensorswitch_v2/ \
            --ignore=tests/tensorswitch_v2/test_real_data.py \
            -v --tb=short
